<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta name="author" content="Daniele Minieri" />
        <!-- Settata nel JS -->
        <link rel="icon" type="image/png" />
        <title>La collezione del nerd</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />
        <link rel="stylesheet" href="./style.css" />
    </head>

    <body>
        <header>
            <div class="header-content">
                <h1>
                    La collezione del nerd
                    <i class="fa-solid fa-film" id="color-switcher"></i>
                </h1>
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <div class="search-state-icon" id="search-state-icon">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </div>
                        <span
                            class="search-param-label"
                            id="search-param-label"
                        ></span>
                        <div
                            id="search-params-menu"
                            class="search-params-menu"
                            aria-hidden="true"
                            role="menu"
                        >
                            <div class="menu-content">
                                <!-- Le opzioni inserite dinamicamente da JavaScript -->
                            </div>
                        </div>
                        <input
                            type="text"
                            class="search-input"
                            placeholder="Cerca per titolo, genere, regista o cast..."
                        />
                        <button class="search-clear">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                    <button
                        id="filter-seen"
                        class="filter-button"
                        data-filter="all"
                        title="Mostra: tutti"
                    >
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
        </header>

        <main>
            <div class="movie-cards-container">
                <!-- Le card inserite dinamicamente da JavaScript -->
            </div>
        </main>

        <div id="alphabet-modal" class="alphabet-modal">
            <div class="alphabet-modal-content">
                <a class="alphabet-modal-close">
                    <i class="fa-solid fa-xmark"></i>
                </a>
                <div class="alphabet-letters"></div>
            </div>
        </div>

        <div class="stats-button" data-tooltip="Statistiche">
            <i class="fa-solid fa-chart-simple"></i>
        </div>
        <div
            class="random-movie-button"
            data-tooltip="Scegli un film casuale da vedere!"
        >
            <i class="fa-solid fa-shuffle"></i>
        </div>
        <script type="text/javascript" src="./script.js"></script>
    </body>
</html>
